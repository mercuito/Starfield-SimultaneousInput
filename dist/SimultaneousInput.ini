; SimultaneousInput plugin config.
; Lives next to SimultaneousInput.dll in <Starfield>/Data/SFSE/Plugins/.
; Edit and relaunch Starfield to apply changes; values are read once at
; plugin load.

[Display]

; LockControllerGlyphs: pin cursor / glyph rendering to the gamepad style
; regardless of which device drove the most recent look event. Camera-side
; simultaneous-input behavior is unchanged: mouse and gamepad both still
; drive the camera. Only the on-screen prompt UX (cursor style, button
; glyphs sourced from the cursor predicate) is forced to gamepad mode.
;
; Default: false (legacy v1.3.0 behavior, glyphs follow the active look
; device).
;
; Set to true if you want controller glyphs to persist even while a mouse
; is in use. Useful on Steam Deck and on couch setups where a real mouse
; is hooked up alongside a controller and you want the controller prompts
; to win.
LockControllerGlyphs = false

; AutoDetectSteamDeck: when true and Steam sets the SteamDeck=1
; environment variable in the game process (it does this on Deck and in
; Big Picture / Deck UI mode), force LockControllerGlyphs to true even if
; the value above is false. The Deck's trackpad and gyro register as
; mouse input, which under v1.3.0 toggles glyphs to mouse style on a
; device with no real mouse, breaking the on-screen prompt UX. The
; auto-detect makes the right thing happen out of the box on Deck without
; per-machine config.
;
; Default: true. Set to false to disable the auto-override and rely on
; LockControllerGlyphs alone.
AutoDetectSteamDeck = true
