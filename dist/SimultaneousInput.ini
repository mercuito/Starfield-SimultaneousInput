; SimultaneousInput plugin config.
; Lives next to SimultaneousInput.dll in <Starfield>/Data/SFSE/Plugins/.
; INI values are read once at plugin load; the runtime hotkey and
; gamepad chord below toggle the lock without restarting Starfield.

[Display]

; LockControllerGlyphs: pin cursor / glyph rendering to the gamepad
; style regardless of which device drove the most recent look event.
; Camera-side simultaneous-input behavior is unchanged: mouse and
; gamepad both still drive the camera. Only on-screen prompt UX
; (cursor style, button glyphs sourced from the cursor predicate) is
; forced to the gamepad branch.
;
; Default in this template: true. Recommended for Steam Remote Play /
; MoonDeck setups streaming from a host PC to a Steam Deck (or any
; controller-form client): the host has no Deck-detection signal
; because Steam Input presents an emulated Xbox controller, so this
; manual switch is the primary mechanism. Flip to false if you also
; play directly with KBM and want the v1.3.0 device-following
; behavior.
LockControllerGlyphs = true

; LockGlyphsHotkey: Win32 virtual-key code that toggles the lock at
; runtime via keyboard. On a desktop this is the easy way to test the
; flag. On Steam Deck via Remote Play / MoonDeck, the gamepad chord
; below is more comfortable; this hotkey is still useful when a
; keyboard is plugged in.
;
; Accepts a hex literal (0x77), a decimal (119), or one of the
; named VK constants below:
;
;   VK_F1 .. VK_F12       0x70 .. 0x7B
;   VK_PAUSE              0x13
;   VK_SCROLL             0x91
;   VK_OEM_PLUS           0xBB    (the = / + key on US layout)
;   VK_OEM_MINUS          0xBD
;   VK_ADD                0x6B    (numpad +)
;   VK_SUBTRACT           0x6D    (numpad -)
;   VK_MULTIPLY           0x6A    (numpad *)
;   VK_DIVIDE             0x6F    (numpad /)
;   VK_NUMPAD0 .. NUMPAD9 0x60 .. 0x69
;
; Default: VK_F8 (0x77). Starfield does not bind F8 in the default
; control scheme.
LockGlyphsHotkey = VK_F8

; LockGlyphsChord: gamepad button combination that toggles the lock
; at runtime, polled via XInput. Hold all listed inputs together for
; LockGlyphsChordHoldMs (below) to fire. The chord latches once
; toggled, so it will not re-fire until you release at least one of
; the inputs.
;
; Default: LB+RB+DPadDown. Both shoulders are physical buttons on the
; Deck and on every standard pad; DPadDown is reachable with the left
; thumb without losing the shoulders. The combination is uncommon in
; default Starfield bindings, so accidental toggles are unlikely.
;
; Token syntax: case-insensitive names joined by `+` (also accepts
; `,`). Recognized tokens:
;
;   Buttons: LB RB LStick RStick A B X Y
;            DPadUp DPadDown DPadLeft DPadRight Start Back (alias Select)
;   Triggers: LT RT (analog, fire above ~12% press)
;
; Example chords:
;   LockGlyphsChord = LB+RB+DPadDown        ; default
;   LockGlyphsChord = Back+Y                ; back + y combo
;   LockGlyphsChord = LStick+RStick         ; click both sticks
;   LockGlyphsChord = LT+RT+Y               ; both triggers + Y
;
; Set to a single token like `Y` to make Y itself the toggle (you
; will probably not want to do this).
LockGlyphsChord = LB+RB+DPadDown

; LockGlyphsChordHoldMs: how long the chord must be held continuously
; before it fires, in milliseconds. Clamped to [50, 5000]. Holding
; protects against accidental toggles during normal play.
;
; Default: 500.
LockGlyphsChordHoldMs = 500
