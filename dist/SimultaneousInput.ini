; SimultaneousInput plugin config.
; Lives next to SimultaneousInput.dll in <Starfield>/Data/SFSE/Plugins/.
; Edit and relaunch Starfield to apply INI changes; values are read once
; at plugin load. The hotkey toggle below works at runtime without a
; restart, so for testing the lock state on/off you can leave the INI
; alone and just press the hotkey in-game.

[Display]

; LockControllerGlyphs: pin cursor / glyph rendering to the gamepad
; style regardless of which device drove the most recent look event.
; Camera-side simultaneous-input behavior is unchanged: mouse and
; gamepad both still drive the camera. Only the on-screen prompt UX
; (cursor style, button glyphs sourced from the cursor predicate) is
; forced to gamepad mode.
;
; Default: false (legacy v1.3.0 behavior, glyphs follow the active
; look device).
;
; Set to true if you want controller glyphs to persist even while a
; mouse is in use. Recommended for Steam Remote Play / MoonDeck users
; streaming from a host PC to a Steam Deck (or any controller-form
; client): the host has no Deck-detection signal because Steam Input
; presents an emulated Xbox controller, so this manual switch is the
; only way to pin glyphs.
LockControllerGlyphs = false

; LockGlyphsHotkey: Win32 virtual-key code that toggles the lock at
; runtime. Useful for testing or for switching glyph styles between
; play sessions without editing the INI. Press the key once to flip
; the state; the change takes effect on the next cursor draw and is
; logged at [I] level in SimultaneousInput.log.
;
; Accepts either a hex literal (0x77), a decimal (119), or one of the
; named VK constants below:
;
;   VK_F1 .. VK_F12       0x70 .. 0x7B
;   VK_PAUSE              0x13
;   VK_SCROLL             0x91
;   VK_OEM_PLUS           0xBB    (the = / + key on US layout)
;   VK_OEM_MINUS          0xBD
;   VK_ADD                0x6B    (numpad +)
;   VK_SUBTRACT           0x6D    (numpad -)
;   VK_MULTIPLY           0x6A    (numpad *)
;   VK_DIVIDE             0x6F    (numpad /)
;   VK_NUMPAD0 .. NUMPAD9 0x60 .. 0x69
;
; Default: VK_F8 (0x77). Starfield does not bind F8 in the default
; control scheme. Pick something that does not collide with your own
; binds.
LockGlyphsHotkey = VK_F8
